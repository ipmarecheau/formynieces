# ============================================================================
# Math Anchor Question Bank — ForMyNieces SEA diagnostic (Slice 2b)
# ============================================================================
# 63 authored multiple-choice anchors covering all 51 Math modules at >=3x
# (direct + indirect via the prerequisite graph). The adaptive walk shows only
# ~15 per child; this is the BANK it draws from.
#
# PROVENANCE: every item is ORIGINAL, authored fresh for this platform,
# inspired by the SEA Standard-5 curriculum (Trinidad & Tobago) but copied from
# no past paper. license: CC-BY-NC-4.0 (platform-owned). This uniform
# provenance is recorded per-item below and carried into the seeder.
#
# FIELD GUIDE
#   module:        syllabus_modules.id this anchor is attached to (one each)
#   sea_section:   inherited from the module (Section I / II / III)
#   strand:        adaptive-ladder strand label
#   difficulty:    1 easy / 2 medium / 3 hard  (drives climb-descend)
#   prompt:        the question text shown to the student
#   options:       four answer choices, in display order
#   correct_index: 0-based index of the correct option
#   distractors:   misconception encoded by each WRONG option (by index)
#   source/license: provenance
#
# Difficulty words map to integers in the DB: easy=1, medium=2, hard=3.
# ============================================================================

provenance_default: &prov
  source: "Original — authored for ForMyNieces, SEA Standard-5 (T&T) curriculum-aligned"
  license: "CC-BY-NC-4.0"

questions:

  # ---- NUMBER CONCEPTS (modules 2,3,5) -------------------------------------
  - module: 5
    sea_section: "Section I"
    strand: "Number"
    difficulty: easy
    prompt: "Which list shows the numbers in order from smallest to largest?"
    options: ["4 092, 4 290, 4 029, 4 920", "4 029, 4 092, 4 290, 4 920", "4 920, 4 290, 4 092, 4 029", "4 029, 4 290, 4 092, 4 920"]
    correct_index: 1
    distractors:
      0: "compares left-to-right digit by digit without aligning place value"
      2: "orders largest-to-smallest, ignores 'smallest first'"
      3: "correct start then stops checking middle values"
    <<: *prov

